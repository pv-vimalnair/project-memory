name: Project Memory CI

on:
  push:
    paths:
      - "plugins/project-memory/**"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "plugins/project-memory/**"
      - ".github/workflows/ci.yml"

permissions:
  contents: read

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    env:
      PROJECT_MEMORY_SKILL_VALIDATOR: ../../.tmp/openai-codex/codex-rs/skills/src/assets/samples/skill-creator/scripts/quick_validate.py
      PROJECT_MEMORY_PLUGIN_VALIDATOR: ../../.tmp/openai-codex/codex-rs/skills/src/assets/samples/plugin-creator/scripts/validate_plugin.py
    defaults:
      run:
        working-directory: plugins/project-memory
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Checkout pinned official Codex validators
        uses: actions/checkout@v4
        with:
          repository: openai/codex
          ref: 56395bddaf26eb2829387ca6a417bf9128e5b239
          path: .tmp/openai-codex
          sparse-checkout: |
            codex-rs/skills/src/assets/samples/skill-creator/scripts
            codex-rs/skills/src/assets/samples/plugin-creator/scripts
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python -m pip install --disable-pip-version-check PyYAML==6.0.3
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: plugins/project-memory/package-lock.json
      - run: npm ci --ignore-scripts
      - run: npm audit --omit=dev
      - run: npm run check
      - run: node scripts/verify-generated.mjs
      - run: npm run plugin:verify
      - run: npm run public-runtime:build
      - run: >-
          git diff --exit-code --
          dist/project-memory.mjs
          dist/project-memory.mjs.sha256
          dist/project-memory-mcp.mjs
          dist/project-memory-mcp.mjs.sha256
          dist/catalog/project-memory/1.0.0
      - run: node dist/cli.js benchmark run --input benchmarks/briefs --output .tmp/benchmark-report.json --json
      - run: npm pack --dry-run
