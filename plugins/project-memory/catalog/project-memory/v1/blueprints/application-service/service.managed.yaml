blueprint:
  id: service.managed
  version: 1.0.0
  status: active
  group_id: blueprint-group.application-service
  allowed_root_kinds:
    - product
  primary_archetype: application-service
  purpose: Use when the enduring root is best described as service managed, independent of its temporary workstreams.
  selection:
    feature_schema_version: 1.0.0
    required_signals:
      - id: service.managed.required-root
        feature: root.kind
        operator: in
        expected:
          - product
        evidence_required: true
    positive_signals:
      - id: service.managed.positive-shape
        feature: product.shape
        operator: equals
        expected: service.managed
        evidence_required: true
        weight: 100
    negative_signals:
      - id: service.managed.negative-shape
        feature: product.anti-shapes
        operator: tag_present
        expected: service.managed
        evidence_required: false
        penalty: 100
    exclusions:
      - id: service.managed.explicit-exclusion
        feature: product.exclusions
        operator: tag_present
        expected: service.managed
        evidence_required: false
    max_positive_weight: 100
    specificity_rank: 107
    precedence: 993
  overlays:
    baked: []
    defaults:
      - overlay.lifecycle.active
      - overlay.commercial.managed-service
      - overlay.runtime.hosted
    forbidden: []
  default_components:
    - component.product-strategy
    - component.ux
    - component.web-client
    - component.backend-service
  default_domains:
    - domain.product-strategy
    - domain.ux-content-design
    - domain.engineering-architecture
  adapter_slots:
    - agent
    - runtime
    - workflow
  required_documents:
    - PROJECT.md
    - PRODUCT.md
    - ARCHITECTURE.md
  validation_gates:
    - root boundary confirmed
    - positive evidence recorded
    - anti-signals evaluated
  positive_examples:
    - A durable service managed root containing many different workstreams.
  negative_examples:
    - A temporary service managed-related deliverable inside another enduring product.
  name: Service Managed
  inclusion_boundary: Include the enduring capabilities and governance of the service managed root.
  exclusion_boundary: Exclude short-lived campaigns, audits, refactors, and checks; represent those as workstreams.
