blueprint:
  id: developer.shared-infrastructure
  version: 1.0.0
  status: active
  group_id: blueprint-group.developer-platform
  allowed_root_kinds:
    - product
    - shared-system
  primary_archetype: developer-platform
  purpose: Use when the enduring root is best described as developer shared infrastructure, independent of its temporary workstreams.
  selection:
    feature_schema_version: 1.0.0
    required_signals:
      - id: developer.shared-infrastructure.required-root
        feature: root.kind
        operator: in
        expected:
          - product
          - shared-system
        evidence_required: true
    positive_signals:
      - id: developer.shared-infrastructure.positive-shape
        feature: product.shape
        operator: equals
        expected: developer.shared-infrastructure
        evidence_required: true
        weight: 100
    negative_signals:
      - id: developer.shared-infrastructure.negative-shape
        feature: product.anti-shapes
        operator: tag_present
        expected: developer.shared-infrastructure
        evidence_required: false
        penalty: 100
    exclusions:
      - id: developer.shared-infrastructure.explicit-exclusion
        feature: product.exclusions
        operator: tag_present
        expected: developer.shared-infrastructure
        evidence_required: false
    max_positive_weight: 100
    specificity_rank: 103
    precedence: 997
  overlays:
    baked: []
    defaults:
      - overlay.lifecycle.active
    forbidden: []
  default_components:
    - component.api
    - component.sdk
    - component.cli
    - component.shared-platform
  default_domains:
    - domain.engineering-architecture
    - domain.release-platform-operations
  adapter_slots:
    - agent
    - runtime
    - workflow
  required_documents:
    - PROJECT.md
    - PRODUCT.md
    - ARCHITECTURE.md
  validation_gates:
    - root boundary confirmed
    - positive evidence recorded
    - anti-signals evaluated
  positive_examples:
    - A durable developer shared infrastructure root containing many different workstreams.
  negative_examples:
    - A temporary developer shared infrastructure-related deliverable inside another enduring product.
  name: Developer Shared Infrastructure
  inclusion_boundary: Include the enduring capabilities and governance of the developer shared infrastructure root.
  exclusion_boundary: Exclude short-lived campaigns, audits, refactors, and checks; represent those as workstreams.
