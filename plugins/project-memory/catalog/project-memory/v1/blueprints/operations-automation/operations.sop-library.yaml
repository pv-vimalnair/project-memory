blueprint:
  id: operations.sop-library
  version: 1.0.0
  status: active
  group_id: blueprint-group.operations-automation
  allowed_root_kinds:
    - shared-system
    - program
  primary_archetype: operations-automation
  purpose: Use when the enduring root is best described as operations sop library, independent of its temporary workstreams.
  selection:
    feature_schema_version: 1.0.0
    required_signals:
      - id: operations.sop-library.required-root
        feature: root.kind
        operator: in
        expected:
          - shared-system
          - program
        evidence_required: true
    positive_signals:
      - id: operations.sop-library.positive-shape
        feature: product.shape
        operator: equals
        expected: operations.sop-library
        evidence_required: true
        weight: 100
    negative_signals:
      - id: operations.sop-library.negative-shape
        feature: product.anti-shapes
        operator: tag_present
        expected: operations.sop-library
        evidence_required: false
        penalty: 100
    exclusions:
      - id: operations.sop-library.explicit-exclusion
        feature: product.exclusions
        operator: tag_present
        expected: operations.sop-library
        evidence_required: false
    max_positive_weight: 100
    specificity_rank: 100
    precedence: 1000
  overlays:
    baked: []
    defaults:
      - overlay.lifecycle.active
    forbidden: []
  default_components:
    - component.operations-workflow
    - component.sop-training
  default_domains:
    - domain.governance-coordination
    - domain.release-platform-operations
  adapter_slots:
    - agent
    - runtime
    - workflow
  required_documents:
    - PROJECT.md
    - PRODUCT.md
    - ARCHITECTURE.md
  validation_gates:
    - root boundary confirmed
    - positive evidence recorded
    - anti-signals evaluated
  positive_examples:
    - A durable operations sop library root containing many different workstreams.
  negative_examples:
    - A temporary operations sop library-related deliverable inside another enduring product.
  name: Operations Sop Library
  inclusion_boundary: Include the enduring capabilities and governance of the operations sop library root.
  exclusion_boundary: Exclude short-lived campaigns, audits, refactors, and checks; represent those as workstreams.
