blueprint:
  id: research.policy-standards
  version: 1.0.0
  status: active
  group_id: blueprint-group.research-knowledge
  allowed_root_kinds:
    - program
    - shared-system
  primary_archetype: research-knowledge
  purpose: Use when the enduring root is best described as research policy standards, independent of its temporary workstreams.
  selection:
    feature_schema_version: 1.0.0
    required_signals:
      - id: research.policy-standards.required-root
        feature: root.kind
        operator: in
        expected:
          - program
          - shared-system
        evidence_required: true
    positive_signals:
      - id: research.policy-standards.positive-shape
        feature: product.shape
        operator: equals
        expected: research.policy-standards
        evidence_required: true
        weight: 100
    negative_signals:
      - id: research.policy-standards.negative-shape
        feature: product.anti-shapes
        operator: tag_present
        expected: research.policy-standards
        evidence_required: false
        penalty: 100
    exclusions:
      - id: research.policy-standards.explicit-exclusion
        feature: product.exclusions
        operator: tag_present
        expected: research.policy-standards
        evidence_required: false
    max_positive_weight: 100
    specificity_rank: 103
    precedence: 997
  overlays:
    baked: []
    defaults:
      - overlay.lifecycle.active
    forbidden: []
  default_components:
    - component.research-program
    - component.knowledge-base
    - component.user-research
    - component.reporting
  default_domains:
    - domain.research-insight
    - domain.data-analytics-ai
  adapter_slots:
    - agent
    - runtime
    - workflow
  required_documents:
    - PROJECT.md
    - PRODUCT.md
    - ARCHITECTURE.md
  validation_gates:
    - root boundary confirmed
    - positive evidence recorded
    - anti-signals evaluated
  positive_examples:
    - A durable research policy standards root containing many different workstreams.
  negative_examples:
    - A temporary research policy standards-related deliverable inside another enduring product.
  name: Research Policy Standards
  inclusion_boundary: Include the enduring capabilities and governance of the research policy standards root.
  exclusion_boundary: Exclude short-lived campaigns, audits, refactors, and checks; represent those as workstreams.
