blueprint:
  id: network.community-social
  version: 1.0.0
  status: active
  group_id: blueprint-group.commerce-network
  allowed_root_kinds:
    - product
  primary_archetype: commerce-network
  purpose: Use when the enduring root is best described as network community social, independent of its temporary workstreams.
  selection:
    feature_schema_version: 1.0.0
    required_signals:
      - id: network.community-social.required-root
        feature: root.kind
        operator: in
        expected:
          - product
        evidence_required: true
    positive_signals:
      - id: network.community-social.positive-shape
        feature: product.shape
        operator: equals
        expected: network.community-social
        evidence_required: true
        weight: 100
    negative_signals:
      - id: network.community-social.negative-shape
        feature: product.anti-shapes
        operator: tag_present
        expected: network.community-social
        evidence_required: false
        penalty: 100
    exclusions:
      - id: network.community-social.explicit-exclusion
        feature: product.exclusions
        operator: tag_present
        expected: network.community-social
        evidence_required: false
    max_positive_weight: 100
    specificity_rank: 103
    precedence: 997
  overlays:
    baked: []
    defaults:
      - overlay.lifecycle.active
      - overlay.surface.web
      - overlay.capability.community-ugc
    forbidden: []
  default_components:
    - component.commerce-catalog
    - component.checkout
    - component.payments
    - component.entitlements
  default_domains:
    - domain.growth-marketing-commercial
    - domain.security-privacy-compliance-trust
  adapter_slots:
    - agent
    - runtime
    - workflow
  required_documents:
    - PROJECT.md
    - PRODUCT.md
    - ARCHITECTURE.md
  validation_gates:
    - root boundary confirmed
    - positive evidence recorded
    - anti-signals evaluated
  positive_examples:
    - A durable network community social root containing many different workstreams.
  negative_examples:
    - A temporary network community social-related deliverable inside another enduring product.
  name: Network Community Social
  inclusion_boundary: Include the enduring capabilities and governance of the network community social root.
  exclusion_boundary: Exclude short-lived campaigns, audits, refactors, and checks; represent those as workstreams.
