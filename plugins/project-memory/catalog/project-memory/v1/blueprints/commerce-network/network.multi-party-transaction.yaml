blueprint:
  id: network.multi-party-transaction
  version: 1.0.0
  status: active
  group_id: blueprint-group.commerce-network
  allowed_root_kinds:
    - product
  primary_archetype: commerce-network
  purpose: Use when the enduring root is best described as network multi party transaction, independent of its temporary workstreams.
  selection:
    feature_schema_version: 1.0.0
    required_signals:
      - id: network.multi-party-transaction.required-root
        feature: root.kind
        operator: in
        expected:
          - product
        evidence_required: true
    positive_signals:
      - id: network.multi-party-transaction.positive-shape
        feature: product.shape
        operator: equals
        expected: network.multi-party-transaction
        evidence_required: true
        weight: 100
    negative_signals:
      - id: network.multi-party-transaction.negative-shape
        feature: product.anti-shapes
        operator: tag_present
        expected: network.multi-party-transaction
        evidence_required: false
        penalty: 100
    exclusions:
      - id: network.multi-party-transaction.explicit-exclusion
        feature: product.exclusions
        operator: tag_present
        expected: network.multi-party-transaction
        evidence_required: false
    max_positive_weight: 100
    specificity_rank: 105
    precedence: 995
  overlays:
    baked: []
    defaults:
      - overlay.lifecycle.active
      - overlay.commercial.marketplace
      - overlay.commercial.transactional
      - overlay.capability.payments
    forbidden: []
  default_components:
    - component.commerce-catalog
    - component.checkout
    - component.payments
    - component.entitlements
  default_domains:
    - domain.growth-marketing-commercial
    - domain.security-privacy-compliance-trust
  adapter_slots:
    - agent
    - runtime
    - workflow
  required_documents:
    - PROJECT.md
    - PRODUCT.md
    - ARCHITECTURE.md
  validation_gates:
    - root boundary confirmed
    - positive evidence recorded
    - anti-signals evaluated
  positive_examples:
    - A durable network multi party transaction root containing many different workstreams.
  negative_examples:
    - A temporary network multi party transaction-related deliverable inside another enduring product.
  name: Network Multi Party Transaction
  inclusion_boundary: Include the enduring capabilities and governance of the network multi party transaction root.
  exclusion_boundary: Exclude short-lived campaigns, audits, refactors, and checks; represent those as workstreams.
