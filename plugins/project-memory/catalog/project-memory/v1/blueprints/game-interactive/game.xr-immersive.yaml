blueprint:
  id: game.xr-immersive
  version: 1.0.0
  status: active
  group_id: blueprint-group.game-interactive
  allowed_root_kinds:
    - product
  primary_archetype: game-interactive
  purpose: Use when the enduring root is best described as game xr immersive, independent of its temporary workstreams.
  selection:
    feature_schema_version: 1.0.0
    required_signals:
      - id: game.xr-immersive.required-root
        feature: root.kind
        operator: in
        expected:
          - product
        evidence_required: true
    positive_signals:
      - id: game.xr-immersive.positive-shape
        feature: product.shape
        operator: equals
        expected: game.xr-immersive
        evidence_required: true
        weight: 100
    negative_signals:
      - id: game.xr-immersive.negative-shape
        feature: product.anti-shapes
        operator: tag_present
        expected: game.xr-immersive
        evidence_required: false
        penalty: 100
    exclusions:
      - id: game.xr-immersive.explicit-exclusion
        feature: product.exclusions
        operator: tag_present
        expected: game.xr-immersive
        evidence_required: false
    max_positive_weight: 100
    specificity_rank: 105
    precedence: 995
  overlays:
    baked: []
    defaults:
      - overlay.lifecycle.active
      - overlay.surface.xr
      - overlay.audience.consumer
    forbidden: []
  default_components:
    - component.game-design
    - component.game-runtime
    - component.game-art
    - component.game-audio
  default_domains:
    - domain.game-design-art-audio-live-operations
    - domain.qa-reliability-performance
  adapter_slots:
    - agent
    - runtime
    - workflow
  required_documents:
    - PROJECT.md
    - PRODUCT.md
    - ARCHITECTURE.md
  validation_gates:
    - root boundary confirmed
    - positive evidence recorded
    - anti-signals evaluated
  positive_examples:
    - A durable game xr immersive root containing many different workstreams.
  negative_examples:
    - A temporary game xr immersive-related deliverable inside another enduring product.
  name: Game Xr Immersive
  inclusion_boundary: Include the enduring capabilities and governance of the game xr immersive root.
  exclusion_boundary: Exclude short-lived campaigns, audits, refactors, and checks; represent those as workstreams.
