blueprint:
  id: design.creative-asset-system
  version: 1.0.0
  status: active
  group_id: blueprint-group.brand-design
  allowed_root_kinds:
    - shared-system
  primary_archetype: brand-design
  purpose: Use when the enduring root is best described as design creative asset system, independent of its temporary workstreams.
  selection:
    feature_schema_version: 1.0.0
    required_signals:
      - id: design.creative-asset-system.required-root
        feature: root.kind
        operator: in
        expected:
          - shared-system
        evidence_required: true
    positive_signals:
      - id: design.creative-asset-system.positive-shape
        feature: product.shape
        operator: equals
        expected: design.creative-asset-system
        evidence_required: true
        weight: 100
    negative_signals:
      - id: design.creative-asset-system.negative-shape
        feature: product.anti-shapes
        operator: tag_present
        expected: design.creative-asset-system
        evidence_required: false
        penalty: 100
    exclusions:
      - id: design.creative-asset-system.explicit-exclusion
        feature: product.exclusions
        operator: tag_present
        expected: design.creative-asset-system
        evidence_required: false
    max_positive_weight: 100
    specificity_rank: 103
    precedence: 997
  overlays:
    baked: []
    defaults:
      - overlay.lifecycle.active
    forbidden: []
  default_components:
    - component.brand
    - component.visual-design
    - component.design-system
    - component.content-design
  default_domains:
    - domain.visual-brand-design-systems
    - domain.ux-content-design
  adapter_slots:
    - agent
    - runtime
    - workflow
  required_documents:
    - PROJECT.md
    - PRODUCT.md
    - ARCHITECTURE.md
  validation_gates:
    - root boundary confirmed
    - positive evidence recorded
    - anti-signals evaluated
  positive_examples:
    - A durable design creative asset system root containing many different workstreams.
  negative_examples:
    - A temporary design creative asset system-related deliverable inside another enduring product.
  name: Design Creative Asset System
  inclusion_boundary: Include the enduring capabilities and governance of the design creative asset system root.
  exclusion_boundary: Exclude short-lived campaigns, audits, refactors, and checks; represent those as workstreams.
