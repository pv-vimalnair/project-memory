component_definition:
  id: component.content-design
  version: 1.0.0
  status: active
  name: Content Design
  type: content
  purpose: Own the content design boundary and its durable project memory.
  inclusion_boundary: Include artifacts, decisions, evidence, and operations directly owned by content design.
  exclusion_boundary: Exclude unrelated work that has no ownership or dependency relationship with content design.
  required_documents:
    - docs/components/content-design.md
  default_domains:
    - domain.ux-content-design
  tags:
    - foundation-product
    - content
    - content-design
  positive_examples:
    - A task changes or validates the project's content design capability.
  negative_examples:
    - A task merely mentions content design without changing or validating it.
