component_definition:
  id: component.product-strategy
  version: 1.0.0
  status: active
  name: Product Strategy
  type: shared-system
  purpose: Own the product strategy boundary and its durable project memory.
  inclusion_boundary: Include artifacts, decisions, evidence, and operations directly owned by product strategy.
  exclusion_boundary: Exclude unrelated work that has no ownership or dependency relationship with product strategy.
  required_documents:
    - docs/components/product-strategy.md
  default_domains:
    - domain.product-strategy
  tags:
    - foundation-product
    - shared-system
    - product-strategy
  positive_examples:
    - A task changes or validates the project's product strategy capability.
  negative_examples:
    - A task merely mentions product strategy without changing or validating it.
