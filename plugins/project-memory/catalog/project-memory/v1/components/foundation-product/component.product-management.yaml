component_definition:
  id: component.product-management
  version: 1.0.0
  status: active
  name: Product Management
  type: workflow
  purpose: Own the product management boundary and its durable project memory.
  inclusion_boundary: Include artifacts, decisions, evidence, and operations directly owned by product management.
  exclusion_boundary: Exclude unrelated work that has no ownership or dependency relationship with product management.
  required_documents:
    - docs/components/product-management.md
  default_domains:
    - domain.product-strategy
  tags:
    - foundation-product
    - workflow
    - product-management
  positive_examples:
    - A task changes or validates the project's product management capability.
  negative_examples:
    - A task merely mentions product management without changing or validating it.
