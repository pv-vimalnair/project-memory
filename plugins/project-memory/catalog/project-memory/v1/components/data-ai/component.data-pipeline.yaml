component_definition:
  id: component.data-pipeline
  version: 1.0.0
  status: active
  name: Data Pipeline
  type: data
  purpose: Own the data pipeline boundary and its durable project memory.
  inclusion_boundary: Include artifacts, decisions, evidence, and operations directly owned by data pipeline.
  exclusion_boundary: Exclude unrelated work that has no ownership or dependency relationship with data pipeline.
  required_documents:
    - docs/components/data-pipeline.md
  default_domains:
    - domain.data-analytics-ai
  tags:
    - data-ai
    - data
    - data-pipeline
  positive_examples:
    - A task changes or validates the project's data pipeline capability.
  negative_examples:
    - A task merely mentions data pipeline without changing or validating it.
