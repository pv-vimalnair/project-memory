component_definition:
  id: component.analytics
  version: 1.0.0
  status: active
  name: Analytics
  type: data
  purpose: Own the analytics boundary and its durable project memory.
  inclusion_boundary: Include artifacts, decisions, evidence, and operations directly owned by analytics.
  exclusion_boundary: Exclude unrelated work that has no ownership or dependency relationship with analytics.
  required_documents:
    - docs/components/analytics.md
  default_domains:
    - domain.data-analytics-ai
  tags:
    - data-ai
    - data
    - analytics
  positive_examples:
    - A task changes or validates the project's analytics capability.
  negative_examples:
    - A task merely mentions analytics without changing or validating it.
