component_definition:
  id: component.instrumentation
  version: 1.0.0
  status: active
  name: Instrumentation
  type: data
  purpose: Own the instrumentation boundary and its durable project memory.
  inclusion_boundary: Include artifacts, decisions, evidence, and operations directly owned by instrumentation.
  exclusion_boundary: Exclude unrelated work that has no ownership or dependency relationship with instrumentation.
  required_documents:
    - docs/components/instrumentation.md
  default_domains:
    - domain.engineering-architecture
  tags:
    - data-ai
    - data
    - instrumentation
  positive_examples:
    - A task changes or validates the project's instrumentation capability.
  negative_examples:
    - A task merely mentions instrumentation without changing or validating it.
