component_definition:
  id: component.configuration
  version: 1.0.0
  status: active
  name: Configuration
  type: platform
  purpose: Own the configuration boundary and its durable project memory.
  inclusion_boundary: Include artifacts, decisions, evidence, and operations directly owned by configuration.
  exclusion_boundary: Exclude unrelated work that has no ownership or dependency relationship with configuration.
  required_documents:
    - docs/components/configuration.md
  default_domains:
    - domain.engineering-architecture
  tags:
    - engineering-services
    - platform
    - configuration
  positive_examples:
    - A task changes or validates the project's configuration capability.
  negative_examples:
    - A task merely mentions configuration without changing or validating it.
