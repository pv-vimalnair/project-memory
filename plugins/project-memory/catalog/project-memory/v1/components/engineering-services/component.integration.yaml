component_definition:
  id: component.integration
  version: 1.0.0
  status: active
  name: Integration
  type: service
  purpose: Own the integration boundary and its durable project memory.
  inclusion_boundary: Include artifacts, decisions, evidence, and operations directly owned by integration.
  exclusion_boundary: Exclude unrelated work that has no ownership or dependency relationship with integration.
  required_documents:
    - docs/components/integration.md
  default_domains:
    - domain.engineering-architecture
  tags:
    - engineering-services
    - service
    - integration
  positive_examples:
    - A task changes or validates the project's integration capability.
  negative_examples:
    - A task merely mentions integration without changing or validating it.
