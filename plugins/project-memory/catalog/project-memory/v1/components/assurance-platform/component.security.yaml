component_definition:
  id: component.security
  version: 1.0.0
  status: active
  name: Security
  type: shared-system
  purpose: Own the security boundary and its durable project memory.
  inclusion_boundary: Include artifacts, decisions, evidence, and operations directly owned by security.
  exclusion_boundary: Exclude unrelated work that has no ownership or dependency relationship with security.
  required_documents:
    - docs/components/security.md
  default_domains:
    - domain.security-privacy-compliance-trust
  tags:
    - assurance-platform
    - shared-system
    - security
  positive_examples:
    - A task changes or validates the project's security capability.
  negative_examples:
    - A task merely mentions security without changing or validating it.
