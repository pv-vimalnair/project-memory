component_definition:
  id: component.distribution
  version: 1.0.0
  status: active
  name: Distribution
  type: platform
  purpose: Own the distribution boundary and its durable project memory.
  inclusion_boundary: Include artifacts, decisions, evidence, and operations directly owned by distribution.
  exclusion_boundary: Exclude unrelated work that has no ownership or dependency relationship with distribution.
  required_documents:
    - docs/components/distribution.md
  default_domains:
    - domain.release-platform-operations
  tags:
    - assurance-platform
    - platform
    - distribution
  positive_examples:
    - A task changes or validates the project's distribution capability.
  negative_examples:
    - A task merely mentions distribution without changing or validating it.
