component_definition:
  id: component.release
  version: 1.0.0
  status: active
  name: Release
  type: workflow
  purpose: Own the release boundary and its durable project memory.
  inclusion_boundary: Include artifacts, decisions, evidence, and operations directly owned by release.
  exclusion_boundary: Exclude unrelated work that has no ownership or dependency relationship with release.
  required_documents:
    - docs/components/release.md
  default_domains:
    - domain.release-platform-operations
  tags:
    - assurance-platform
    - workflow
    - release
  positive_examples:
    - A task changes or validates the project's release capability.
  negative_examples:
    - A task merely mentions release without changing or validating it.
