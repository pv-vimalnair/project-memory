id: enterprise.rbac.implement
version: 1.0.0
status: active
purpose: Implement bounded rbac work in the enterprise family with explicit evidence and authority.
selection:
  feature_schema_version: 1.0.0
  required_signals:
    - id: enterprise.rbac.implement.family
      feature: work.family
      operator: equals
      expected: enterprise
      evidence_required: true
    - id: enterprise.rbac.implement.mode
      feature: action.mode
      operator: equals
      expected: implement
      evidence_required: true
  positive_signals:
    - id: enterprise.rbac.implement.object
      feature: work.object
      operator: equals
      expected: rbac
      evidence_required: true
      weight: 100
  negative_signals:
    - id: enterprise.rbac.implement.negative
      feature: work.anti-patterns
      operator: tag_present
      expected: enterprise.rbac.implement
      evidence_required: false
      penalty: 100
  exclusions:
    - id: enterprise.rbac.implement.exclusion
      feature: work.exclusions
      operator: tag_present
      expected: enterprise.rbac.implement
      evidence_required: false
  max_positive_weight: 100
  specificity_rank: 100
  precedence: 100
composition:
  allowed_primary_pattern_ids: []
  mandatory_companion_rule_ids:
    - companion.mutation
  incompatible_pattern_ids: []
  triggers_companions: true
duties:
  - inspect
  - modify
  - validate
  - record
write_scope:
  - accepted-task-owned-paths
authorization:
  mutation: task-scoped
  task_result_submission: worker
  factual_integration: integrator
  workstream_activation: automatic-by-rule
  directional_acceptance: Pitaji
  external_action: none
inputs:
  - accepted workstream outcome
  - current canonical snapshot
  - task-scoped evidence
outputs:
  - enterprise rbac implement result
  - completion evidence
evidence:
  - source references
  - validation results
  - changed-path inventory
gates:
  - scope is accepted
  - authority covers every duty
  - required evidence is current
memory_updates:
  - worklog
  - evidence
  - handoff
completion_conditions:
  - all declared duties are resolved
  - required gates pass
  - remaining risks are recorded
fallback_and_escalation:
  - fail closed on missing evidence
  - return semantic ambiguity to the integrator
  - request Pitaji approval for directional change
