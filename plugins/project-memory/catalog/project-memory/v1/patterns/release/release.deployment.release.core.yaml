id: release.deployment.release
version: 1.0.0
status: active
purpose: Release bounded deployment work in the release family with explicit evidence and authority.
selection:
  feature_schema_version: 1.0.0
  required_signals:
    - id: release.deployment.release.family
      feature: work.family
      operator: equals
      expected: release
      evidence_required: true
    - id: release.deployment.release.mode
      feature: action.mode
      operator: equals
      expected: release
      evidence_required: true
  positive_signals:
    - id: release.deployment.release.object
      feature: work.object
      operator: equals
      expected: deployment
      evidence_required: true
      weight: 100
  negative_signals:
    - id: release.deployment.release.negative
      feature: work.anti-patterns
      operator: tag_present
      expected: release.deployment.release
      evidence_required: false
      penalty: 100
  exclusions:
    - id: release.deployment.release.exclusion
      feature: work.exclusions
      operator: tag_present
      expected: release.deployment.release
      evidence_required: false
  max_positive_weight: 100
  specificity_rank: 100
  precedence: 100
composition:
  allowed_primary_pattern_ids: []
  mandatory_companion_rule_ids:
    - companion.production-release
  incompatible_pattern_ids: []
  triggers_companions: true
duties:
  - inspect
  - validate
  - approve
  - release
  - record
write_scope: []
authorization:
  mutation: approval-required
  task_result_submission: worker
  factual_integration: integrator
  workstream_activation: integrator
  directional_acceptance: Pitaji
  external_action: explicit-approval-required
inputs:
  - accepted workstream outcome
  - current canonical snapshot
  - task-scoped evidence
outputs:
  - release deployment release result
  - completion evidence
evidence:
  - source references
  - validation results
  - changed-path inventory
gates:
  - scope is accepted
  - authority covers every duty
  - required evidence is current
memory_updates:
  - worklog
  - evidence
  - handoff
completion_conditions:
  - all declared duties are resolved
  - required gates pass
  - remaining risks are recorded
fallback_and_escalation:
  - fail closed on missing evidence
  - return semantic ambiguity to the integrator
  - request Pitaji approval for directional change
