pattern_taxonomy:
  pattern_id: product.root.retire
  pattern_version: 1.0.0
  compatibility:
    root_kinds:
      - product
      - shared-system
      - program
      - portfolio
      - engagement
    primary_archetypes:
      - application-service
      - developer-platform
      - game-interactive
      - ai-data
      - commerce-network
      - content-learning
      - brand-design
      - research-knowledge
      - operations-automation
      - portfolio
      - engagement
    required_overlays: []
    forbidden_overlays: []
  overlay_applicability:
    baked: []
    allowed:
      - overlay.lifecycle.active
    forbidden: []
  component_impacts:
    - selector:
        tag: product
      duties:
        - inspect
        - modify
        - validate
        - approve
        - record
      requirement: conditional
      condition: affected_component_matches_family
      reason: The selected component owns affected product artifacts.
      write_scope:
        - resolved-component-paths
      responsible_role: Pitaji
  domain_impacts:
    - selector:
        id: domain.product-strategy
      duties:
        - inspect
        - validate
        - approve
        - record
      requirement: required
      condition: true
      reason: The product domain owns durable oversight and evidence for this pattern.
      write_scope: []
      required_records:
        - worklog
        - evidence
      responsible_role: Pitaji
