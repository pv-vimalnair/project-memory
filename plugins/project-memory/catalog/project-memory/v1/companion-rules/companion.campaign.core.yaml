id: companion.campaign
version: 1.0.0
status: active
purpose: Narrow campaign work by adding mandatory validation and evidence without expanding authority.
when:
  all:
    - id: companion.campaign.when
      feature: project.tags
      operator: tag_present
      expected: campaign
      evidence_required: true
  any: []
  none: []
require_patterns:
  - id: content.review.validate
    version_range: 1.0.0
    condition: true
  - id: growth.measurement.design
    version_range: 1.0.0
    condition: true
require_duties:
  - validate
  - record
require_evidence:
  - validated campaign evidence
  - linked source references
authority_effect: narrow-only
conflict_policy: fail_closed
