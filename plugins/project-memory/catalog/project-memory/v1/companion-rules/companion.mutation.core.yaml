id: companion.mutation
version: 1.0.0
status: active
purpose: Narrow mutation work by adding mandatory validation and evidence without expanding authority.
when:
  all:
    - id: companion.mutation.when
      feature: action.mode
      operator: in
      expected:
        - implement
        - change
      evidence_required: true
  any: []
  none: []
require_patterns:
  - id: governance.evidence.validate
    version_range: 1.0.0
    condition: true
  - id: governance.documentation.validate
    version_range: 1.0.0
    condition: true
  - id: qa.regression.validate
    version_range: 1.0.0
    condition: true
require_duties:
  - validate
  - record
require_evidence:
  - validated mutation evidence
  - linked source references
authority_effect: narrow-only
conflict_policy: fail_closed
