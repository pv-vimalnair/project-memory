id: companion.personal-data
version: 1.0.0
status: active
purpose: Narrow personal data work by adding mandatory validation and evidence without expanding authority.
when:
  all:
    - id: companion.personal-data.when
      feature: project.tags
      operator: tag_present
      expected: personal-data
      evidence_required: true
  any: []
  none: []
require_patterns:
  - id: security.privacy.assess
    version_range: 1.0.0
    condition: true
  - id: data.governance.assess
    version_range: 1.0.0
    condition: true
require_duties:
  - validate
  - record
require_evidence:
  - validated personal data evidence
  - linked source references
authority_effect: narrow-only
conflict_policy: fail_closed
