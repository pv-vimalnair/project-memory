id: companion.ai
version: 1.0.0
status: active
purpose: Narrow ai work by adding mandatory validation and evidence without expanding authority.
when:
  all:
    - id: companion.ai.when
      feature: project.tags
      operator: tag_present
      expected: ai
      evidence_required: true
  any: []
  none: []
require_patterns:
  - id: ai.evaluation.validate
    version_range: 1.0.0
    condition: true
  - id: ai.safety.assess
    version_range: 1.0.0
    condition: true
require_duties:
  - validate
  - record
require_evidence:
  - validated ai evidence
  - linked source references
authority_effect: narrow-only
conflict_policy: fail_closed
