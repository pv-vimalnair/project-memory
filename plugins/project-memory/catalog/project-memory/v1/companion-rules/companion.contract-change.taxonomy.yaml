companion_taxonomy:
  rule_id: companion.contract-change
  rule_version: 1.0.0
  compatibility:
    root_kinds:
      - product
      - shared-system
      - program
      - portfolio
      - engagement
    primary_archetypes:
      - application-service
      - developer-platform
      - game-interactive
      - ai-data
      - commerce-network
      - content-learning
      - brand-design
      - research-knowledge
      - operations-automation
      - portfolio
      - engagement
    required_overlays: []
    forbidden_overlays: []
  overlay_applicability:
    baked: []
    allowed:
      - overlay.lifecycle.active
    forbidden: []
  component_impacts:
    - selector:
        tag: contract-change
      duties:
        - inspect
        - validate
        - record
      requirement: conditional
      condition: companion_rule_applies
      reason: Contract Change requires independent component evidence.
      write_scope: []
      responsible_role: validator
  domain_impacts:
    - selector:
        id: domain.governance-coordination
      duties:
        - inspect
        - validate
        - record
      requirement: required
      condition: true
      reason: Contract Change must remain visible in canonical coordination records.
      write_scope: []
      required_records:
        - worklog
        - evidence
      responsible_role: validator
