overlay_definition:
  id: overlay.audience.developer
  version: 1.0.0
  status: active
  name: Audience Developer
  category: audience
  purpose: Apply the audience developer trait without changing the enduring project root.
  inclusion_boundary: Include constraints and defaults caused specifically by the audience developer trait.
  exclusion_boundary: Do not use this overlay as a substitute for a blueprint, component, or temporary workstream.
  compatible_root_kinds:
    - product
    - shared-system
    - program
    - portfolio
    - engagement
  compatible_archetypes:
    - application-service
    - developer-platform
    - game-interactive
    - ai-data
    - commerce-network
    - content-learning
    - brand-design
    - research-knowledge
    - operations-automation
    - portfolio
    - engagement
  requires_overlays: []
  conflicts_with: []
  default_components:
    - component.product-strategy
  default_domains:
    - domain.product-strategy
  required_documents:
    - docs/overlays/audience-developer.md
  required_records:
    - profile-lock
    - decision-log
  tags:
    - market-shape
    - audience
    - developer
  positive_examples:
    - The project explicitly operates with the audience developer trait.
  negative_examples:
    - A one-off task resembles audience developer but does not change the project trait.
