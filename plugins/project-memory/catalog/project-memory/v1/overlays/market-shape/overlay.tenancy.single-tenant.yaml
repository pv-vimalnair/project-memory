overlay_definition:
  id: overlay.tenancy.single-tenant
  version: 1.0.0
  status: active
  name: Tenancy Single Tenant
  category: tenancy
  purpose: Apply the tenancy single tenant trait without changing the enduring project root.
  inclusion_boundary: Include constraints and defaults caused specifically by the tenancy single tenant trait.
  exclusion_boundary: Do not use this overlay as a substitute for a blueprint, component, or temporary workstream.
  compatible_root_kinds:
    - product
    - shared-system
    - program
    - portfolio
    - engagement
  compatible_archetypes:
    - application-service
    - developer-platform
    - game-interactive
    - ai-data
    - commerce-network
    - content-learning
    - brand-design
    - research-knowledge
    - operations-automation
    - portfolio
    - engagement
  requires_overlays: []
  conflicts_with:
    - overlay.tenancy.multi-tenant
  default_components:
    - component.identity
  default_domains:
    - domain.engineering-architecture
  required_documents:
    - docs/overlays/tenancy-single-tenant.md
  required_records:
    - profile-lock
    - decision-log
  tags:
    - market-shape
    - tenancy
    - single-tenant
  positive_examples:
    - The project explicitly operates with the tenancy single tenant trait.
  negative_examples:
    - A one-off task resembles tenancy single tenant but does not change the project trait.
