overlay_definition:
  id: overlay.surface.api
  version: 1.0.0
  status: active
  name: Surface Api
  category: surface
  purpose: Apply the surface api trait without changing the enduring project root.
  inclusion_boundary: Include constraints and defaults caused specifically by the surface api trait.
  exclusion_boundary: Do not use this overlay as a substitute for a blueprint, component, or temporary workstream.
  compatible_root_kinds:
    - product
    - shared-system
    - program
    - portfolio
    - engagement
  compatible_archetypes:
    - application-service
    - developer-platform
    - game-interactive
    - ai-data
    - commerce-network
    - content-learning
    - brand-design
    - research-knowledge
    - operations-automation
    - portfolio
    - engagement
  requires_overlays: []
  conflicts_with: []
  default_components:
    - component.api
  default_domains:
    - domain.engineering-architecture
  required_documents:
    - docs/overlays/surface-api.md
  required_records:
    - profile-lock
    - decision-log
  tags:
    - market-shape
    - surface
    - api
  positive_examples:
    - The project explicitly operates with the surface api trait.
  negative_examples:
    - A one-off task resembles surface api but does not change the project trait.
