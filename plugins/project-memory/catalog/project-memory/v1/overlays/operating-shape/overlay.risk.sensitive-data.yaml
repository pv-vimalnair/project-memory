overlay_definition:
  id: overlay.risk.sensitive-data
  version: 1.0.0
  status: active
  name: Risk Sensitive Data
  category: risk
  purpose: Apply the risk sensitive data trait without changing the enduring project root.
  inclusion_boundary: Include constraints and defaults caused specifically by the risk sensitive data trait.
  exclusion_boundary: Do not use this overlay as a substitute for a blueprint, component, or temporary workstream.
  compatible_root_kinds:
    - product
    - shared-system
    - program
    - portfolio
    - engagement
  compatible_archetypes:
    - application-service
    - developer-platform
    - game-interactive
    - ai-data
    - commerce-network
    - content-learning
    - brand-design
    - research-knowledge
    - operations-automation
    - portfolio
    - engagement
  requires_overlays: []
  conflicts_with: []
  default_components:
    - component.security
  default_domains:
    - domain.security-privacy-compliance-trust
  required_documents:
    - docs/overlays/risk-sensitive-data.md
  required_records:
    - profile-lock
    - decision-log
  tags:
    - operating-shape
    - risk
    - sensitive-data
  positive_examples:
    - The project explicitly operates with the risk sensitive data trait.
  negative_examples:
    - A one-off task resembles risk sensitive data but does not change the project trait.
