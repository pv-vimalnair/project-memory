overlay_definition:
  id: overlay.distribution.play-store
  version: 1.0.0
  status: active
  name: Distribution Play Store
  category: distribution
  purpose: Apply the distribution play store trait without changing the enduring project root.
  inclusion_boundary: Include constraints and defaults caused specifically by the distribution play store trait.
  exclusion_boundary: Do not use this overlay as a substitute for a blueprint, component, or temporary workstream.
  compatible_root_kinds:
    - product
    - shared-system
    - program
    - portfolio
    - engagement
  compatible_archetypes:
    - application-service
    - developer-platform
    - game-interactive
    - ai-data
    - commerce-network
    - content-learning
    - brand-design
    - research-knowledge
    - operations-automation
    - portfolio
    - engagement
  requires_overlays:
    - overlay.surface.mobile
  conflicts_with: []
  default_components:
    - component.distribution
  default_domains:
    - domain.release-platform-operations
  required_documents:
    - docs/overlays/distribution-play-store.md
  required_records:
    - profile-lock
    - decision-log
  tags:
    - operating-shape
    - distribution
    - play-store
  positive_examples:
    - The project explicitly operates with the distribution play store trait.
  negative_examples:
    - A one-off task resembles distribution play store but does not change the project trait.
