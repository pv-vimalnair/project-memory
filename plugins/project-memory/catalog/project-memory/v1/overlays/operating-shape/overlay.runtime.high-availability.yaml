overlay_definition:
  id: overlay.runtime.high-availability
  version: 1.0.0
  status: active
  name: Runtime High Availability
  category: runtime
  purpose: Apply the runtime high availability trait without changing the enduring project root.
  inclusion_boundary: Include constraints and defaults caused specifically by the runtime high availability trait.
  exclusion_boundary: Do not use this overlay as a substitute for a blueprint, component, or temporary workstream.
  compatible_root_kinds:
    - product
    - shared-system
    - program
    - portfolio
    - engagement
  compatible_archetypes:
    - application-service
    - developer-platform
    - game-interactive
    - ai-data
    - commerce-network
    - content-learning
    - brand-design
    - research-knowledge
    - operations-automation
    - portfolio
    - engagement
  requires_overlays: []
  conflicts_with: []
  default_components:
    - component.infrastructure
  default_domains:
    - domain.release-platform-operations
  required_documents:
    - docs/overlays/runtime-high-availability.md
  required_records:
    - profile-lock
    - decision-log
  tags:
    - operating-shape
    - runtime
    - high-availability
  positive_examples:
    - The project explicitly operates with the runtime high availability trait.
  negative_examples:
    - A one-off task resembles runtime high availability but does not change the project trait.
