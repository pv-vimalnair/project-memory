domain_definition:
  id: domain.content-communications-localization
  version: 1.0.0
  status: active
  name: Content Communications Localization
  purpose: Preserve authoritative content communications localization context across workstreams and agents.
  inclusion_boundary: Include decisions, records, risks, and evidence whose primary owner is content communications localization.
  exclusion_boundary: Exclude facts whose canonical owner is another permanent domain.
  compatible_root_kinds:
    - product
    - shared-system
    - program
    - portfolio
    - engagement
  compatible_archetypes:
    - application-service
    - developer-platform
    - game-interactive
    - ai-data
    - commerce-network
    - content-learning
    - brand-design
    - research-knowledge
    - operations-automation
    - portfolio
    - engagement
  default_components:
    - component.editorial-content
    - component.localization
  required_records:
    - decision-log
    - worklog
    - evidence
  required_documents:
    - docs/domains/content-communications-localization.md
  tags:
    - permanent-domain
    - content-communications-localization
  positive_examples:
    - A durable content communications localization decision must remain available after handoff.
  negative_examples:
    - A temporary scratch note with no accepted content communications localization fact.
