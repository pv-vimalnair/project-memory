domain_definition:
  id: domain.engineering-architecture
  version: 1.0.0
  status: active
  name: Engineering Architecture
  purpose: Preserve authoritative engineering architecture context across workstreams and agents.
  inclusion_boundary: Include decisions, records, risks, and evidence whose primary owner is engineering architecture.
  exclusion_boundary: Exclude facts whose canonical owner is another permanent domain.
  compatible_root_kinds:
    - product
    - shared-system
    - program
    - portfolio
    - engagement
  compatible_archetypes:
    - application-service
    - developer-platform
    - game-interactive
    - ai-data
    - commerce-network
    - content-learning
    - brand-design
    - research-knowledge
    - operations-automation
    - portfolio
    - engagement
  default_components:
    - component.api
    - component.backend-service
    - component.datastore
  required_records:
    - decision-log
    - worklog
    - evidence
  required_documents:
    - docs/domains/engineering-architecture.md
  tags:
    - permanent-domain
    - engineering-architecture
  positive_examples:
    - A durable engineering architecture decision must remain available after handoff.
  negative_examples:
    - A temporary scratch note with no accepted engineering architecture fact.
