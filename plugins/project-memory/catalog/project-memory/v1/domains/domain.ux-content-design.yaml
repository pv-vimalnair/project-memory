domain_definition:
  id: domain.ux-content-design
  version: 1.0.0
  status: active
  name: Ux Content Design
  purpose: Preserve authoritative ux content design context across workstreams and agents.
  inclusion_boundary: Include decisions, records, risks, and evidence whose primary owner is ux content design.
  exclusion_boundary: Exclude facts whose canonical owner is another permanent domain.
  compatible_root_kinds:
    - product
    - shared-system
    - program
    - portfolio
    - engagement
  compatible_archetypes:
    - application-service
    - developer-platform
    - game-interactive
    - ai-data
    - commerce-network
    - content-learning
    - brand-design
    - research-knowledge
    - operations-automation
    - portfolio
    - engagement
  default_components:
    - component.ux
    - component.content-design
  required_records:
    - decision-log
    - worklog
    - evidence
  required_documents:
    - docs/domains/ux-content-design.md
  tags:
    - permanent-domain
    - ux-content-design
  positive_examples:
    - A durable ux content design decision must remain available after handoff.
  negative_examples:
    - A temporary scratch note with no accepted ux content design fact.
