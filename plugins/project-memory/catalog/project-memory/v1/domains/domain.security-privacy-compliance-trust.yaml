domain_definition:
  id: domain.security-privacy-compliance-trust
  version: 1.0.0
  status: active
  name: Security Privacy Compliance Trust
  purpose: Preserve authoritative security privacy compliance trust context across workstreams and agents.
  inclusion_boundary: Include decisions, records, risks, and evidence whose primary owner is security privacy compliance trust.
  exclusion_boundary: Exclude facts whose canonical owner is another permanent domain.
  compatible_root_kinds:
    - product
    - shared-system
    - program
    - portfolio
    - engagement
  compatible_archetypes:
    - application-service
    - developer-platform
    - game-interactive
    - ai-data
    - commerce-network
    - content-learning
    - brand-design
    - research-knowledge
    - operations-automation
    - portfolio
    - engagement
  default_components:
    - component.security
    - component.privacy
    - component.compliance
  required_records:
    - decision-log
    - worklog
    - evidence
  required_documents:
    - docs/domains/security-privacy-compliance-trust.md
  tags:
    - permanent-domain
    - security-privacy-compliance-trust
  positive_examples:
    - A durable security privacy compliance trust decision must remain available after handoff.
  negative_examples:
    - A temporary scratch note with no accepted security privacy compliance trust fact.
