domain_definition:
  id: domain.data-analytics-ai
  version: 1.0.0
  status: active
  name: Data Analytics Ai
  purpose: Preserve authoritative data analytics ai context across workstreams and agents.
  inclusion_boundary: Include decisions, records, risks, and evidence whose primary owner is data analytics ai.
  exclusion_boundary: Exclude facts whose canonical owner is another permanent domain.
  compatible_root_kinds:
    - product
    - shared-system
    - program
    - portfolio
    - engagement
  compatible_archetypes:
    - application-service
    - developer-platform
    - game-interactive
    - ai-data
    - commerce-network
    - content-learning
    - brand-design
    - research-knowledge
    - operations-automation
    - portfolio
    - engagement
  default_components:
    - component.analytics
    - component.data-pipeline
    - component.ai-model
  required_records:
    - decision-log
    - worklog
    - evidence
  required_documents:
    - docs/domains/data-analytics-ai.md
  tags:
    - permanent-domain
    - data-analytics-ai
  positive_examples:
    - A durable data analytics ai decision must remain available after handoff.
  negative_examples:
    - A temporary scratch note with no accepted data analytics ai fact.
