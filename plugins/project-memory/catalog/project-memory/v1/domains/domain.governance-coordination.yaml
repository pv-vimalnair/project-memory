domain_definition:
  id: domain.governance-coordination
  version: 1.0.0
  status: active
  name: Governance Coordination
  purpose: Preserve authoritative governance coordination context across workstreams and agents.
  inclusion_boundary: Include decisions, records, risks, and evidence whose primary owner is governance coordination.
  exclusion_boundary: Exclude facts whose canonical owner is another permanent domain.
  compatible_root_kinds:
    - product
    - shared-system
    - program
    - portfolio
    - engagement
  compatible_archetypes:
    - application-service
    - developer-platform
    - game-interactive
    - ai-data
    - commerce-network
    - content-learning
    - brand-design
    - research-knowledge
    - operations-automation
    - portfolio
    - engagement
  default_components:
    - component.product-management
  required_records:
    - decision-log
    - worklog
    - evidence
  required_documents:
    - docs/domains/governance-coordination.md
  tags:
    - permanent-domain
    - governance-coordination
  positive_examples:
    - A durable governance coordination decision must remain available after handoff.
  negative_examples:
    - A temporary scratch note with no accepted governance coordination fact.
