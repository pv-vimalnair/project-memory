adapter_definition:
  id: adapter.ios
  version: 1.0.0
  status: active
  name: Ios
  kind: runtime
  purpose: Translate canonical Project Memory context for Ios without duplicating source-of-truth facts.
  inclusion_boundary: Include detection, commands, gates, conventions, and handoff fields specific to Ios.
  exclusion_boundary: Exclude canonical product decisions and records that belong in Project Memory itself.
  compatible_root_kinds:
    - product
    - shared-system
    - program
    - portfolio
    - engagement
  compatible_archetypes:
    - application-service
    - developer-platform
    - game-interactive
    - ai-data
    - commerce-network
    - content-learning
    - brand-design
    - research-knowledge
    - operations-automation
    - portfolio
    - engagement
  detection_signals:
    - xcode project
    - Swift sources
  relevant_files:
    - Package.swift
    - project.pbxproj
  repository_conventions:
    - Read canonical Project Memory before work
    - Write only within an accepted task scope
  supported_commands:
    - inspect project context
    - validate task evidence
    - prepare a completion packet
  validation_gates:
    - adapter inputs resolve
    - canonical records are not duplicated
    - handoff is evidence linked
  default_components:
    - component.configuration
  default_domains:
    - domain.engineering-architecture
  required_documents:
    - docs/adapters/ios.md
  required_records:
    - worklog
    - evidence
    - handoff
  risks:
    - stale generated adapter view
    - tool-specific text diverges from canonical memory
  handoff_fields:
    - task identifier
    - base revision
    - scope
    - evidence
    - remaining risks
  tags:
    - runtime
    - ios
  positive_examples:
    - The repository contains verified Ios signals and the task uses that tool.
  negative_examples:
    - The task mentions Ios but the repository has no matching runtime or workflow.
