schema_version: "1.0.0"
benchmark: "project-memory-supported-brief-resolution"
catalog_case_count: 150
thresholds:
  minimum_supported_resolution_rate: 0.98
  maximum_clarification_questions_per_supported_brief: 1
  maximum_schema_invention_count: 0
  maximum_authority_expansion_count: 0
metrics:
  supported_resolution_rate: "Supported briefs matching every declared selection expectation divided by all supported briefs."
  schema_invention_count: "Definition IDs returned outside the locked catalog."
