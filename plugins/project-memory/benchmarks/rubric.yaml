  max_clarification_questions: "Largest clarification count observed for one supported brief."
acceptance:
  deterministic_gate_required: true
  lower_reasoning_trial_runs_required: 2
  supported_briefs_per_trial_run_required: 30
  deterministic_success_alone_accepts_v1: false
  credentials_permitted_in_evidence: false
